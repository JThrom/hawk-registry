  - id: endcord
    name: endcord
    description: Feature rich Discord TUI client.
    categories:
      - messaging
    binaries:
      - endcord
    homepage: https://github.com/mzivic7/endcord
    repo: https://github.com/mzivic7/endcord
    language: Rust
    tags:
      - feature
      - rich
      - discord
    installNotes: |-
      ## Installing
      ### Linux
      - Pre-built binaries (**recommended**) are available in releases  
          Binaries are built on Ubuntu-like distro with `--custom-python --nuitka` build script options with clang, meaning they are maximally optimized.
      - Arch Linux (AUR):
          - `yay -S endcord` - full version with media support, larger executable
          - `yay -S endcord-lite` - lite version without voice calls and media support
          - `-git` versions will build from source, with latest changes
      - [Build](#building) endcord, then copy built executable to system:  
          `sudo cp dist/endcord /usr/local/bin/`
      - Install script (installs binary from latest release or updates existing):
          - `bash -c "$(curl -fsSL https://raw.githubusercontent.com/sparklost/endcord/main/tools/install.sh)"`
          - Append ` -- --lite` to install lite instead
          - Append ` -- --uninstall` to uninstall  
      Note: official means installations from these sources are coming from endcord developer and will always be up-to-date.

      Optional dependencies:
      - `xclip` - Clipboard support on X11
      - `wl-clipboard` - Clipboard support on Wayland
      - `yazi` / `zenity` / `kdialog` - File dialog when uploading
      - `aspell` - Spellchecking (and `aspell-en` dictionary)
      - `git` - Install and update extensions from other sources than github
      - `yt-dlp` - youtube support
      - `mpv` - Play youtube videos in native player (non-ascii)
      - `libsecret` - Store token in system keyring (secret service provider is also required (eg. `gnome-keyring`, `KWallet`, `KeePassXC`), with `dbus` as dependency)
      - `libappindicator-gtk3` - Tray support under wayland, for [experimental windowed mode](#experimental-windowed-mode) only.
      - `imagemagick` - To make notification images round; only needed for endcord-lite.
      - `source-highlight` or `python-pygments` - Code block syntax highlighting (Alternatively use [this extension](https://github.com/sparklost/endcord-pygments-syntax)).

      ### Windows
      - Pre-built binaries (built with nuitka) are available in releases
      - [Build](#building) endcord, standalone executable can be found in `./dist/endcord.exe`  

      Install [WezTerm](https://wezterm.org/) (recommended), [windows terminal](https://github.com/microsoft/terminal), [cmder](https://github.com/cmderdev/cmder), or any other modern terminal. And run exe from there. If built with experimental windowed mode, terminal is not required to use endcord.  
      WezTerm proved to introduce the least drawing issues.  
      Cmder settings: "Mouse" > check "Send mouse events to console" and "Mark/Copy" > uncheck "Intelligent mode", and set "Main console font" and "Alternative font" to same monospace font.  
      Emoji are known to work only with WezTerm but many will fail to draw and mess-up the UI, so its best to set `emoji_as_text = True` in config.  
      Optional dependency for spellchecking: [aspell](https://github.com/adamyg/aspell-win32). It is expected to be installed in `C:\Program Files (x86)\`. Alongside with base aspell, dictionary must be installed, even en_US.  

      ### macOS
      - Pre-built binaries (built with pyinstaller and clang) are available in releases
      - [Build](#building) endcord, standalone executable can be found in `./dist/`.  
      - Install script (installs binary from latest release or updates existing):
          - `bash -c "$(curl -fsSL https://raw.githubusercontent.com/sparklost/endcord/main/tools/install.sh)"`
          - Append ` -- --lite` to install lite instead
          - Append ` -- --uninstall` to uninstall
      Optional dependency for spellchecking: `aspell`. Can be installed with: `brew aspell`.  

      ### BSD
      - [Build](#building) endcord, standalone executable can be found in `./dist/endcord`
    readmeUrl: https://raw.githubusercontent.com/mzivic7/endcord/HEAD/README.md
  - id: etcd-walker
    name: etcd-walker
    description: Opensource TUI tool for managing etcd keys
    categories:
      - containers
    binaries:
      - etcd-walker
    homepage: https://github.com/nexusriot/etcd-walker/
    repo: https://github.com/nexusriot/etcd-walker/
    language: Go
    tags:
      - opensource
      - managing
      - etcd
      - keys
    install:
      apt: apt-get install git
    packages:
      apt: git
    installNotes: |-
      ### Building

      The repository ships a `Makefile` that wraps the whole cross-build matrix.
      Run `make help` to list every target (it prints the resolved `VERSION`):

      ```bash
      make help            # list targets
      make x86_64          # linux/amd64 into dist/
      make x86_64-static   # fully static linux/amd64 (CGO off)
      make uconsole        # linux/arm64 (ClockworkPi uConsole CM4)
      make pizero2w        # linux/arm64 (Raspberry Pi Zero 2 W, 64-bit OS)
      make all             # every platform into dist/
      make debs            # .deb packages (amd64 + i386 + arm64 + armhf)
      make test vet fmt    # developer shortcuts
      ```

      The manual `go build` invocations below are equivalent if you prefer not to
      use the Makefile.

      Standard build:

      ```bash
      go build ./cmd/etcd-walker
      ```

      Static build (no libc dependency, useful inside scratch / distroless
      containers):

      ```bash
      go build -o etcd-walker_linux_x64_static \
        -ldflags "-linkmode external -extldflags -static" \
        ./cmd/etcd-walker
      ```

      Verify with `ldd`:

      ```bash
      ldd etcd-walker
      ```

      32-bit (i686) build:

      ```bash
      GOOS=linux GOARCH=386 go build -o etcd-walker_linux_i686 ./cmd/etcd-walker
      ```

      FreeBSD build:

      ```bash
      GOOS=freebsd GOARCH=amd64 go build -o etcd-walker_freebsd_x86_64 ./cmd/etcd-walker
      ```

      #### Building a `.deb` package

      Install the build dependencies once:

      ```bash
      sudo apt-get install git devscripts build-essential lintian upx-ucl golang
      ```

      Then build the packages with the Makefile (preferred):

      ```bash
      make debs                       # amd64 + i386 + arm64 + armhf
      make deb-arm64                  # a single architecture
      make debs VERSION=0.6.6         # override the version
      ```

      The legacy shell helpers still work and produce an equivalent package:

      ```bash
      ./build-deb.sh           # amd64
      ./build-deb-arm64.sh     # arm64
      ```

      The resulting package is written to `build/etcd-walker_<version>_<arch>.deb`.

      ---
