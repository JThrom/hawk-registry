  - id: argonaut
    name: Argonaut
    description: ArgoCD TUI
    categories:
      - containers
    binaries:
      - argonaut
    homepage: https://github.com/darksworm/argonaut
    repo: https://github.com/darksworm/argonaut
    language: Go
    tags:
      - argocd
    install:
      brew: brew install darksworm/tap/argonaut
    packages:
      brew: argonaut
    installNotes: |-
      ## 🚀 Installation methods

      <details>
        <summary><strong>Install Script (Linux/macOS)</strong></summary>

      ```bash
      curl -sSL https://raw.githubusercontent.com/darksworm/argonaut/main/install.sh | sh
      ```

      The install script automatically detects your system (including musl vs glibc on Linux) and downloads the appropriate binary from the latest release.

      You can also install a specific version:
      ```bash
      curl -sSL https://raw.githubusercontent.com/darksworm/argonaut/main/install.sh | sh -s -- v1.13.0
      ```
      </details>

      <details>
        <summary><strong>Homebrew (Linux/MacOS)</strong></summary>

      ```bash
      brew tap darksworm/homebrew-tap
      brew install darksworm/tap/argonaut
      ```
      </details>

      <details>
        <summary><strong>AUR (Arch User Repository)</strong></summary>

      ```bash
      yay -S argonaut-bin
      ```

      Or, to track the latest commit on `main` (rebuilt from source on install):

      ```bash
      yay -S argonaut-git
      ```
      </details>

      <details>
          <summary><strong>Nix</strong></summary>
      With Nix and Flakes enabled, you can run or install Argonaut from nixpkgs or directly from the repository.

      ### nixpkgs

      Argonaut is currently available on the `unstable` channel of [nixpkgs](https://search.nixos.org/packages?channel=unstable&query=argonaut&show=argonaut). So you can install it using

      ```bash
      nix-env -iA nixos.argonaut
      ```

      On other systems (macOS, non-NixOS Linux):

      ```bash
      nix-env -iA nixpkgs.argonaut
      ```

      or by adding it to your `systemPackages`.

      ```nix
      environment.systemPackages = with pkgs; [ argonaut ];
      ```

      ### Run Directly

      To run Argonaut without permanently installing it, use the `nix run` command:

      ```bash
      nix run github:darksworm/argonaut
      ```

      ### Development Shell

      To enter a development shell with Argonaut and its dependencies (like Go, Delta, and Argocd) available for development, use the `nix develop` command:

      ```bash
      nix develop github:darksworm/argonaut
      ```

      ### Flakes

      If you are using Flakes to manage your systems add this to your Flake:

      ```nix
      inputs = {
        argonaut = {
          url = "github:darksworm/argonaut";
          inputs.nixpkgs.follows = "nixpkgs";
        };
        # ...
      }
      ```

      </details>

      <details>
        <summary><strong>Docker</strong></summary>

      Pull the image:
      ```bash
      docker pull ghcr.io/darksworm/argonaut:latest
      ```

      Run with mounted Argo CD config (as your host user to preserve permissions):
      ```bash
      docker run -it --rm \
        -u $(id -u):$(id -g) \
        -v ~/.config/argocd:/home/appuser/.config/argocd:ro \
        ghcr.io/darksworm/argonaut:latest
      ```

      The container needs access to your Argo CD configuration for authentication. The `:ro` flag mounts it as read-only for security.
      </details>

      [//]: # (</details>)

      [//]: # (<details>)

      [//]: # (  <summary><strong>NUR &#40;Nix User Repository&#41;</strong></summary>)

      [//]: # ()
      [//]: # (```bash)

      [//]: # (nix-env -iA nur.repos.darksworm.argonaut)

      [//]: # (```)

      [//]: # (</details>)

      <details>
        <summary><strong>Download a binary</strong></summary>

      You can download binaries and packages in from the [**latest release**](https://github.com/darksworm/argonaut/releases/latest).

      </details>
    readmeUrl: https://raw.githubusercontent.com/darksworm/argonaut/HEAD/README.md
  - id: arttime
    name: arttime
    description: An app that brings beauty of text-art together with functionality of clock, timer, and pattern-based time manager.
    categories:
      - misc
    binaries:
      - arttime
    homepage: https://github.com/reportaman/arttime
    repo: https://github.com/reportaman/arttime
    tags:
      - brings
      - beauty
      - text
      - together
      - functionality
      - clock
      - timer
      - pattern
      - time
      - manager
    install:
      apt: apt install /tmp/arttime_2.4.0-1_all.deb
    packages:
      apt: arttime_2.4.0-1_all.deb
    installNotes: |-
      # Installation

      There are three installation methods: 1) Simple, 2) Manual, 3) Package manager. As the name suggests, 1) Simple method should be used by users who want a simple install experience (also no password required), 2) Manual method is for users who are fluent in using terminal and want the most customize install experience (check any optional dependencies at [arttime dependencies](https://github.com/poetaman/arttime/wiki#dependencies)), 3) Package manager method automates dependency installation, though mostly requires admin password to install.

      <!--
      There are three installation methods: 1) Simple, 2) Manual. As the name suggests, 1) Simple method should be used by users who want a simple install experience (also no password required), 2) Manual method is for users who are fluent in using terminal and want the most customize install experience (check any optional dependencies at [arttime dependencies](https://github.com/poetaman/arttime/wiki#dependencies).
      -->

      ---

      1) Simple install method:
      - Open some "Terminal" application on your computer
      - Copy following line from start to end. *(Note: hovering your computer mouse near the right end of the following box will show a button inside the box, clicking it will copy the line for you. Or else you will have to press and hold to the mouse to scroll and select the entire line from beginning to end, and copy it.)*
      ```
      zsh -c '{url="https://gist.githubusercontent.com/poetaman/bdc598ee607e9767fe33da50e993c650/raw/d0146d258a30daacb9aee51deca9410d106e4237/arttime_online_installer.sh"; zsh -c "$(curl -fsSL $url || wget -qO- $url)"}'
      ```
      - Paste the above copied line in "Terminal" application, and press ``Enter``
      - Installer will print any further action you need to take before running it.
      - Type ``arttime`` and press ``Enter``, arttime will launch!

      Note: The simple install method installs arttime under ``~/.local``, which is a standard install directory for local installation.

      ---

      2) Manual install method:
      - Clone the github repository somewhere on your machine
      - ``cd`` to that directory
      - Run ``./install.sh -h`` to see the options for installation
      - Run ``./install.sh`` with your options of choice
      - Rest is similar to the last 2 steps of simple installer


      ---
      3) Package manager method:
      Arttime might also be available as a package or build receipe in your favorite system distribution.

      [![Packaging status](https://repology.org/badge/vertical-allrepos/arttime.svg)](https://repology.org/project/arttime/versions)

      For Debian, Ubuntu, etc Linuxes that use ``apt``, please download and install latest .deb package: [arttime_2.4.0-1_all.deb](https://github.com/poetaman/arttime/releases/download/v2.4.0/arttime_2.4.0-1_all.deb). Instructions:
      ```
      $ mv arttime_2.4.0-1_all.deb /tmp
      $ sudo apt install /tmp/arttime_2.4.0-1_all.deb
      ```


      If you don't see your favorite distribution and would like to volunteer then get in touch. Useful links: [arttime dependencies](https://github.com/poetaman/arttime/wiki#dependencies), [arttime discussions](https://github.com/poetaman/arttime/discussions), [@ehaupt](https://github.com/ehaupt)'s [FreeBSD PR](https://github.com/poetaman/arttime/pull/25)/[FreeBSD port](https://github.com/freebsd/freebsd-ports/commit/7f2f0cc69b9348a6bfcbdbeee5793616628307b4)/[FreeBSD art](https://github.com/poetaman/arttime/pull/25/commits/943fa08cffaa16a59a9aefbfd432467afc65b1c4). Once you have added a package, open a pull request with some representative art like [FreeBSD mascot](https://github.com/poetaman/arttime/pull/25/commits/943fa08cffaa16a59a9aefbfd432467afc65b1c4) to get representation for your favorite distribution/OS (mascots are preferred over logos).


      ## Try arttime in docker?
      Docker being a containerized environment can be a preferred way of trying applications for some geeks. With docker already installed you can give arttime a quick try in a docker container, ***though without arttime's sounds/notifications***. Copy-Paste-Enter the following command in a term
      …
