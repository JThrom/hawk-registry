  - id: weathr
    name: weathr
    description: A terminal weather app with ASCII animations for weather visualization
    categories:
      - screensavers
    binaries:
      - weathr
    homepage: https://github.com/veirt/weathr
    repo: https://github.com/veirt/weathr
    language: Rust
    tags:
      - weather
      - ascii
      - animations
      - visualization
    install:
      cargo: cargo install weathr
      brew: brew install Veirt/veirt/weathr
    packages:
      cargo: weathr
      brew: weathr
    installNotes: |-
      ## Installation

      ### Quick Install (macOS, Linux, FreeBSD)

      Download and install the latest binary with one command:

      ```sh
      curl -fsSL https://raw.githubusercontent.com/Veirt/weathr/main/install.sh | sh
      ```

      ### Via Cargo

      ```bash
      cargo install weathr
      ```

      ### Build from Source

      You need Rust installed.

      ```bash
      git clone https://github.com/veirt/weathr.git
      cd weathr
      cargo install --path .
      ```

      ### Docker

      Run the published image from GHCR:

      ```bash
      docker run --rm -it ghcr.io/veirt/weathr:latest
      ```

      Mount your config if you want to use your existing settings:

      ```bash
      docker run --rm -it \
        -v "$HOME/.config/weathr:/.config/weathr:ro" \
        ghcr.io/veirt/weathr:latest
      ```

      Build the image locally:

      ```bash
      docker build -t weathr .
      ```

      Run it interactively so the TUI can access your terminal:

      ```bash
      docker run --rm -it weathr
      ```

      Mount your config if you want to use your existing settings:

      ```bash
      docker run --rm -it \
        -v "$HOME/.config/weathr:/.config/weathr:ro" \
        weathr
      ```

      ### Homebrew (macOS)

      ```bash
      brew install Veirt/veirt/weathr
      ```

      ### MacPorts (macOS)

      ```bash
      sudo port install weathr
      ```

      ### Arch Linux

      Available in AUR:

      ```bash
      yay -S weathr
      ```

      or

      ```bash
      yay -S weathr-bin
      ```

      ### Nix flake (NixOS)

      Available as a flake:

      ```nix
      inputs = {
          weathr.url = "github:Veirt/weathr";
      };
      ```

      Add to packages:

      ```nix
      environment.systemPackages = [
          inputs.weathr.packages.${system}.default
      ];
      ```

      or use home-manager module option:

      ```nix
      imports = [
          inputs.weathr.homeModules.weathr
      ];

      programs.weathr = {
          enable = true;
          settings = {
              hide_hud = true;
          };
      };
      ```

      ### Windows

      Available through Winget:

      ```
      winget install -i Veirt.weathr
      ```
    readmeUrl: https://raw.githubusercontent.com/veirt/weathr/HEAD/README.md
