      | Package Manager | Linux Distribution      | Command                            |
      | --------------- | ----------------------- | ---------------------------------- |
      | APK             | Alpine Linux            | `sudo apk add fzf`                 |
      | APT             | Debian 9+/Ubuntu 19.10+ | `sudo apt install fzf`             |
