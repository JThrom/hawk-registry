installNotes: |-
  ### INSTALLATION

  To install `pipe-viewer`, run:

  ```console
      perl Build.PL
      sudo ./Build installdeps
      sudo ./Build install
  ```

  To install `gtk-pipe-viewer` along with `pipe-viewer`, run:

  ```console
      perl Build.PL --gtk
      sudo ./Build installdeps
      sudo ./Build install
  ```
