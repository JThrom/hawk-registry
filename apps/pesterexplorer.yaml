installNotes: "## Installation\r

  \r

  > [!IMPORTANT]\r

  > This module is for PowerShell 7. This won't work in Windows PowerShell.\r

  \r

  ```pwsh\r

  Install-Module PesterExplorer -Scope CurrentUser\r

  ```\r

  \r

  Installing this module will install it's dependencies which are Pester and\r

  PwshSpectreConsole."
