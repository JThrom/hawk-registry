installNotes: |-
  Installation
  ------------

  Simply install with:

      pip3 install topydo

  If you wish to use column mode: install additional dependencies with:

      pip3 install topydo[columns]

  Similarly, for prompt mode you can install additional dependencies with:

      pip3 install topydo[prompt]
