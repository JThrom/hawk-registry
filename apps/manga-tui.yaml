id: manga-tui
name: manga-tui
description: Terminal-based manga reader and downloader with image rendering support
categories:
  - media
binaries:
  - manga-tui
  - manga
homepage: https://github.com/josueBarretogit/manga-tui
repo: https://github.com/josueBarretogit/manga-tui
language: Rust
tags:
  - manga
  - reader
  - downloader
  - image
  - rendering
install:
  apt: apt install libdbus-1-dev
  dnf: dnf install dbus-devel
  pacman: pacman -S dbus
  cargo: cargo install manga-tui
packages:
  apt: libdbus-1-dev
  dnf: dbus-devel
  pacman: dbus
  cargo: manga-tui
installNotes: |-
  ## Installation

  ### Using cargo

  ```shell
  cargo install manga-tui --locked
  ```

  ### AUR

  You can install `manga-tui` from the [AUR](https://aur.archlinux.org/packages/manga-tui) with using an [AUR helper](https://wiki.archlinux.org/title/AUR_helpers).

  ```shell
  paru -S manga-tui
  ```

  ### Nix

  If you have the [Nix package manager](https://nixos.org/), this repo provides a flake that builds the latest git version from source.

  Simply run the following:

  ```sh
  nix run 'github:josueBarretogit/manga-tui'
  ```

  Or, to install persistently:

  ```sh
  nix profile install 'github:josueBarretogit/manga-tui'
  ```
readmeUrl: https://raw.githubusercontent.com/josueBarretogit/manga-tui/HEAD/README.md
