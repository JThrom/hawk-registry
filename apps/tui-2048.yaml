installNotes: |-
  ## Installation

  ### From PyPI (recommended)

  ```bash
  pip install tui-2048
  ```

  ### From source

  ```bash
  git clone https://github.com/ps06756/tui-2048.git
  cd tui-2048
  pip install .
  ```

  ### Development install

  ```bash
  pip install -e .
  ```
