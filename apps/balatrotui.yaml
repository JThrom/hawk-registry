installNotes: |-
  ## Getting Started

  ### Prerequisites

  - [Rust](https://www.rust-lang.org/tools/install) (latest stable recommended)

  ### Build and Run

  ```sh
  cargo run --release --package balatro_tui
  ```

  ### Format and Lint

  ```sh
  cargo fmt
  cargo clippy
  ```

  ### Run Tests

  ```sh
  cargo test --workspace
  ```
