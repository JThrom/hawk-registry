installNotes: |-
  ## Installation

  ### Using Install Script (Recommended)

  ```bash
  curl -fsSL https://raw.githubusercontent.com/unhappychoice/gitlogue/main/install.sh | bash
  ```

  ### Using Homebrew

  ```bash
  brew install gitlogue
  ```

  ### Using Cargo

  ```bash
  cargo install gitlogue
  ```

  ### On Arch Linux

  ```bash
  pacman -S gitlogue
