installNotes: |-
  ## Debian/Ubuntu Installation

  ```
  git clone https://github.com/tgraf/bmon.git
  cd bmon
  apt-get install build-essential make libconfuse-dev libnl-3-dev libnl-route-3-dev libncurses-dev pkg-config dh-autoreconf
  ./autogen.sh
  ./configure
  make
  make install
  bmon
  ```
