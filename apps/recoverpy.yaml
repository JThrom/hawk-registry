installNotes: |-
  ## 📦 Installation

  ### Requirements

  - Linux
  - Python 3.9+

  Accessing raw block devices typically requires `sudo`.

  ### Using `uv`

  ```bash
  sudo uvx recoverpy
  ````

  Or install locally:

  ```bash
  uv tool install recoverpy
  sudo recoverpy
  ```

  ### Using pip

  ```bash
  python -m pip install recoverpy
  sudo recoverpy
  ```

