installNotes: |-
  ### INSTALLATION

  #### Prerequisites:

  - Python 3.8 or higher
  - pip package manager

  **Steps:**

  Clone the repository:

  `git clone <repository-url>`
  `cd markln`

  **Install requirements:**

  `pip install -r requirements.txt`

  **Run the editor:**

  `python markln.py`
