id: sockttop
name: sockttop
description: socktop is a remote system monitor with a rich TUI, inspired by top/btop, talking to a lightweight agent over WebSockets.
categories:
  - dashboards
binaries:
  - sockttop
homepage: https://github.com/jasonwitty/socktop
repo: https://github.com/jasonwitty/socktop
language: Rust
tags:
  - monitor
  - system
  - socktop
  - remote
  - rich
  - inspired
  - btop
  - talking
  - lightweight
  - agent
  - over
  - websockets
install:
  apt: apt-get install libdrm-dev
  cargo: cargo install socktop
packages:
  apt: libdrm-dev
  cargo: socktop
installNotes: |-
