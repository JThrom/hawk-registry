  ## Install

  ### Pre-build binaries

  See [releases](https://github.com/anmitsu/goful/releases).

  ### Go version >= 1.16

      $ go install github.com/anmitsu/goful@latest
      ...
      $ goful

  ### Go version < 1.16

      $ go get github.com/anmitsu/goful
      ...
      $ goful
