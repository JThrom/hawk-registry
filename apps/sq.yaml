installNotes: |-
  ## Installation

  ### Prerequisites
  - Go 1.22 or later

  ### Install
  ```bash
  go install github.com/sheenazien8/sq@latest
  ```

  ### From source
  ```bash
  go mod download
  go mod tidy
  go build -o sq
  ./sq
  ```

  ### Running
  ```bash
  go run .
  ```

  ### Command Line Options
  ```bash
  sq --help                    # Show help
  sq --version                 # Show version
  sq --create-connection       # Create a new database connection
  ```
