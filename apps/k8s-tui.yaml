installNotes: |-
  ## Installation

  ### From Source

  ```bash
  git clone https://github.com/otavioCosta2110/k8s-tui.git
  cd k8s-tui
  go build -o k8s-tui ./cmd
  ```

  ### Binary Releases

  Download pre-built binaries from the [releases page](https://github.com/otavioCosta2110/k8s-tui/releases).
