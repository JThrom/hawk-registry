installNotes: |-
  ## Installation

  ### With uv (recommended)

  Install from PyPI:

      uv tool install burf

  Or run from source:

      git clone git@github.com:razeghi71/burf.git
      cd burf
      uv sync

  ### With pip

  You can install it directly from PyPi:

      pip install burf

  or using source code:

      git clone git@github.com:razeghi71/burf.git
      cd burf
      pip install .
