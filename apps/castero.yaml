installNotes: |-
  ## Installation

  Install from [PyPi](https://pypi.org/project/castero) with pip:

  ```bash
  $ pip3 install castero
  ```

  Upgrading:

  ```bash
  $ pip3 install castero --upgrade
  ```

  ### Manual Installation

  ```bash
  $ git clone https://github.com/xgi/castero
  $ cd castero
  $ sudo python setup.py install
  ```
