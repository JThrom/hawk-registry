installNotes: |-
  ## How to install

  [![Packaging status](https://repology.org/badge/vertical-allrepos/caligula-burning-tool.svg)](https://repology.org/project/caligula-burning-tool/versions)

  There are a couple of ways to install Caligula.

  - **Binary release:** You can download pre-built binaries from [the latest Github release](https://github.com/ifd3f/caligula/releases/latest).
  - **Arch Linux:**
    - [Official repository](https://archlinux.org/packages/extra/x86_64/caligula): `pacman -S caligula`
    - [caligula-bin on the AUR](https://aur.archlinux.org/packages/caligula-bin): We also automatically publish binaries with every release.
    - [caligula-git on the AUR](https://aur.archlinux.org/packages/caligula-git): Build from latest commit on `main` branch
    - [caligula-git on archlinuxcn](https://github.com/archlinuxcn/repo/tree/master/archlinuxcn/caligula-git): Prebuilt binaries from latest commit on `main` branch
  - **Nix:**
    - [Nixpkgs](https://github.com/NixOS/nixpkgs/blob/master/pkgs/by-name/ca/caligula/package.nix): `nix-env -i caligula`
    - Repository flake: If your system is flake-enabled, you can use `github:ifd3f/caligula`. You should probably pin to a version, though, because `main` can potentially break.
  - **Homebrew**: [philocalyst has made a homebrew tap for caligula](https://github.com/philocalyst/homebrew-tap): `brew tap philocalyst/tap && brew install caligula`
  - **Cargo:** Caligula is published on [crates.io](https://crates.io/crates/caligula). Just run `cargo install caligula`
  - **Build from source:** This is a relatively standard cargo project so you should be able to just `git clone` and `cargo build --release` it.

  ### Platform support

  | OS    | Architecture | Automated builds | Basic tests | Full tests |
  | ----- | ------------ | ---------------- | ----------- | ---------- |
  | Linux | x86_64       | ✅               | ✅          | ✅         |
  |       | aarch64      | ✅               | ❌          | ❌         |
  | MacOS | x86_64       | ✅               | ✅          | ❌         |
  |       | aarch64      | ✅               | ✅          | ❌         |

  Notes on definitions:

  - **Automated builds** means we ensure that the platform is able to build inside CI and we publish binaries for the platform. This does not guarantee that Caligula works at all!
  - **Basic tests** means we run unit tests, and test that `caligula --help` works. Caligula is _likely_ to work on this platform, but there is potential for uncaught issues between releases.
  - **Full tests** means that, in addition to the basic unit tests, we also run the complete end-to-end VM test suite battery defined in the [checks/](./checks) directory. Caligula is expected to fully work on this platform.

  #### Platform notes

  - In theory, Linux for non-x86_64 does work, and people have used it successfully. However, we are not making any guarantees right now. It is in the works, though -- see tracking issues for [aarch64 e2e tests](https://github.com/ifd3f/caligula/issues/220) and [riscv64 support](https://github.com/ifd3f/caligula/issues/221).
  - MacOS has a couple of known bugs and support for it is very limited. A big barrier is that setting up end-to-end testing for it is hard (see [tracking issue](https://github.com/ifd3f/caligula/issues/219)), and [automated escalation being broken is a known issue](https://github.com/ifd3f/caligula/issues/125). Help would be appreciated here!
  - We plan on supporting [Windows](https://github.com/ifd3f/caligula/issues/2) and [BSDs](https://github.com/ifd3f/caligula/issues/3) Eventually™.
  - If you would like support for other OSes and architectures not already mentioned, please file an issue!
