installNotes: |-
  ## install 

  ### download
  ```
   git clone https://github.com/jonaburg/nodebro.git 
  ```
  ### enter downloaded directory and build
  ```
   cd nodebro
   go build -o nodebro 
  ```
  ### move binary to path
  ```
   mv nodebro /usr/local/bin/nodebro
  ```
