installNotes: |-
  ## Installation/Update

  ### Homebrew

  ```bash
  brew install 0xjuanma/tap/helm
  ```

  ### Script

  ```bash
  curl -sSL https://raw.githubusercontent.com/0xjuanma/helm/main/scripts/install.sh | sh
  ```

  ### Build from Source

  ```bash
  git clone https://github.com/0xjuanma/helm.git
  cd helm
  go build
  ./helm
  ```
