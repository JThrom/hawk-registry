installNotes: |-
  ## Installation

  ```bash
  cargo install omaro --locked
  ```

  Or, directly from source:

  ```bash
  cargo install --git https://github.com/rolv-apneseth/omaro --locked
  ```

  ### AUR

  ```bash
  paru -S omaro
  ```
