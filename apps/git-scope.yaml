id: git-scope
name: git-scope
description: Terminal UI dashboard for inspecting multiple local Git repositories.
categories:
  - dev
binaries:
  - git-scope
homepage: https://github.com/Bharath-code/git-scope
repo: https://github.com/Bharath-code/git-scope
language: Go
tags:
  - git
  - vcs
  - dashboard
  - inspecting
  - multiple
  - local
  - repositories
install:
  brew: brew install git-scope
  go: go install github.com/Bharath-code/git-scope/cmd/git-scope@latest
packages:
  brew: git-scope
  go: git-scope
installNotes: |-
  ## ⚡ Installation

  Get started in seconds.

  ### Homebrew (macOS/Linux)
  ```bash
  brew tap Bharath-code/tap && brew install git-scope
  ````
  ### Update
  ```bash
  brew upgrade git-scope
  ````

  ### Universal Installer (macOS/Linux)
  ```bash
  curl -sSL https://raw.githubusercontent.com/Bharath-code/git-scope/main/scripts/install.sh | sh
  ```

  ### Scoop (Windows)
  ```powershell
  scoop bucket add git-scope https://github.com/Bharath-code/git-scope
  scoop install git-scope
  ```

  ### From Source (Windows)

  ```bash
  go install github.com/Bharath-code/git-scope/cmd/git-scope@latest
  ```

  *If you find this useful, please consider giving it a ⭐ star to help others find it\!*

