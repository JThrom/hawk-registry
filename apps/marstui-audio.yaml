installNotes: |-
  ## building fails if not using these packages:
  sudo apt install libdbus-1-dev pkg-config


  ```
  git clone https://github.com/schooldanlp6/marstui-rustio
  cd marstui-rustio
  cargo build --release
  cd target/release
  chmod +x marstui-audio
  sudo cp marstui-audio /bin/marstui-audio
  ```
