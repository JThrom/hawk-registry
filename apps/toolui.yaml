installNotes: |-
  ## Installation And Usage

  Locally:
  ```
  dotnet tool install ToolUI
  dotnet tool run dotnet-toolui
  dotnet tool uninstall ToolUI
  ```
  Globally:
  ```
  dotnet tool install ToolUI --global 
  dotnet toolui
  dotnet tool uninstall ToolUI --global
  ```
