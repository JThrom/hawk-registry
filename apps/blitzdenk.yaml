installNotes: |-
  ## Install

  You can download the pre compiled binaries from [the release page](https://github.com/Lommix/blitzdenk/releases) or build it yourself:

  ```
  zig build --release=small
  cp zig-out/bin/blitz ~/.local/bin/blitz
  ```
